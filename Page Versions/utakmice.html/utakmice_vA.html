<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Game Countdown Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
        }
        .timer-glow {
            text-shadow: 0 0 8px rgba(52, 211, 153, 0.5);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 font-sans antialiased">

    <div class="bg-slate-800/80 backdrop-blur-xl border border-slate-700/50 p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-2xl relative overflow-hidden">
        
        <div class="flex items-center justify-between mb-6 border-b border-slate-700/50 pb-4">
            <h2 class="text-xs font-bold tracking-[0.2em] text-slate-400 uppercase flex items-center gap-2">
                Upcoming Fixtures
            </h2>
            <div id="refresh-indicator" class="flex items-center gap-2 text-[10px] text-slate-500 uppercase tracking-wider">
                <span id="status-text">Syncing</span>
                <div id="status-dot" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
            </div>
        </div>
        
        <div id="matches-container" class="space-y-1">
            <!-- Loading Skeleton -->
            <div class="animate-pulse space-y-4 py-2">
                <div class="h-10 bg-slate-700/50 rounded-lg w-full"></div>
                <div class="h-10 bg-slate-700/50 rounded-lg w-full"></div>
                <div class="h-10 bg-slate-700/50 rounded-lg w-full"></div>
                <div class="h-10 bg-slate-700/50 rounded-lg w-full"></div>
            </div>
        </div>
    </div>

    <script>
        const targetTeams = [
            { id: '111', fallbackName: 'FC Juventus' },
            { id: '364', fallbackName: 'FC Liverpool' },
            { id: '360', fallbackName: 'FC Manchester United' },
            { id: '382', fallbackName: 'FC Manchester City' }
        ];

        let matchData = [];
        let timerInterval = null;

        async function fetchWithRetry(url, retries = 3, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const res = await fetch(url);
                    if (res.ok) return await res.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
                await new Promise(resolve => setTimeout(resolve, delay));
            }
        }

        async function fetchSchedules() {
            const statusText = document.getElementById('status-text');
            const statusDot = document.getElementById('status-dot');
            statusText.innerText = 'Syncing...';
            statusDot.className = 'w-2 h-2 rounded-full bg-amber-500 animate-pulse';
            
            const newMatchData = [];
            const now = new Date();
            
            for (const team of targetTeams) {
                try {
                    // Using the "core" team endpoint which is more reliable for all-competition upcoming events
                    const data = await fetchWithRetry(`https://site.api.espn.com/apis/site/v2/sports/soccer/all/teams/${team.id}`);
                    
                    if (data && data.team && data.team.nextEvent) {
                        const event = data.team.nextEvent[0];
                        const date = new Date(event.date);
                        
                        const competition = event.competitions[0];
                        const competitors = competition.competitors;
                        const homeComp = competitors.find(c => c.homeAway === 'home');
                        const awayComp = competitors.find(c => c.homeAway === 'away');

                        newMatchData.push({
                            id: team.id,
                            home: homeComp?.team?.shortDisplayName || homeComp?.team?.name || 'TBD',
                            away: awayComp?.team?.shortDisplayName || awayComp?.team?.name || 'TBD',
                            date: date
                        });
                    } else {
                        // Fallback attempt if nextEvent is missing
                        newMatchData.push({
                            id: team.id,
                            error: 'Fixture TBD',
                            fallback: team.fallbackName
                        });
                    }
                } catch (e) {
                    newMatchData.push({
                        id: team.id,
                        error: 'Service Offline',
                        fallback: team.fallbackName
                    });
                }
            }
            
            matchData = newMatchData;
            renderMatches();
            statusText.innerText = 'Live';
            statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500 animate-pulse';
        }

        function renderMatches() {
            const container = document.getElementById('matches-container');
            container.innerHTML = ''; 
            
            matchData.forEach((match, index) => {
                const row = document.createElement('div');
                row.className = `flex flex-col sm:flex-row sm:justify-between sm:items-center p-3 rounded-lg transition-colors hover:bg-slate-700/30 gap-2 ${index !== matchData.length - 1 ? 'border-b border-slate-700/30' : ''}`;
                
                if (match.error) {
                    row.innerHTML = `
                        <span class="text-slate-300 font-medium">${match.fallback}</span>
                        <span class="text-slate-500 text-xs font-mono bg-slate-700/50 px-3 py-1 rounded-md uppercase tracking-tighter">${match.error}</span>
                    `;
                } else {
                    row.innerHTML = `
                        <div class="flex items-center text-slate-200 font-medium tracking-wide text-[15px]">
                            <span class="truncate max-w-[280px]">${match.home} <span class="text-slate-500 mx-1">:</span> ${match.away}</span>
                            <span class="text-slate-600 mx-3 hidden sm:inline">-</span>
                        </div>
                        <div class="flex items-center">
                            <span class="timer font-mono text-emerald-400 bg-emerald-400/10 px-3 py-1.5 rounded-md text-sm timer-glow tracking-widest font-semibold min-w-[130px] text-center" id="timer-${match.id}">
                                0D 0h 0'
                            </span>
                        </div>
                    `;
                }
                container.appendChild(row);
            });
            
            if (timerInterval) clearInterval(timerInterval);
            updateCountdowns();
            timerInterval = setInterval(updateCountdowns, 1000);
        }

        function updateCountdowns() {
            const now = new Date();
            
            matchData.forEach(match => {
                if (match.error || !match.date) return;
                const el = document.getElementById(`timer-${match.id}`);
                if (!el) return;
                
                const diff = match.date - now;
                
                if (diff <= 0) {
                    el.innerText = 'MATCH LIVE';
                    el.classList.replace('text-emerald-400', 'text-amber-400');
                    return;
                }
                
                const d = Math.floor(diff / (1000 * 60 * 60 * 24));
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / 1000 / 60) % 60);
                
                el.innerText = `${d}D ${h}h ${m}'`;
            });
        }

        fetchSchedules();
        // Check for schedule changes every 30 minutes
        setInterval(fetchSchedules, 30 * 60 * 1000); 
    </script>
</body>
</html>

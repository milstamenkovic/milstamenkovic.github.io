<!-- Version B -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mil Stamenković @</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --black:      #080808;
      --deep-red:   #5a0a0a;
      --dark-red:   #8b1a1a;
      --accent-red: #a52020;
      --gold-dim:   #7a6020;
      --gold:       #b8922a;
      --gold-light: #d4a843;
      --text-main:  #ff0000e0;
      --text-muted: #6a5a48;
      --border:     #72000071;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    a { color: var(--accent-red); }

    body {
      background-color: var(--black);
      color: var(--text-main);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Language Toggle ── */
    .lang-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 100;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      padding: 5px 10px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .lang-btn.active {
      background: var(--deep-red);
      color: var(--gold-light);
    }

    .lang-btn:hover:not(.active) {
      color: var(--accent-red);
    }

    .lang-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 28px;
    }

    .avatar-canvas {
      position: absolute;
      inset: -8px;
      width: calc(100% + 16px);
      height: calc(100% + 16px);
      pointer-events: none;
      z-index: 2;
    }

    .avatar-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 0%;
      overflow: hidden;
      z-index: 1;
    }

    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Name & Bio ── */
    .name {
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--deep-red);
      text-align: center;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .title-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent-red);
      margin-top: 6px;
      text-align: center;
    }

    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 18px auto;
    }

    .bio {
      font-size: 1em;
      font-weight: 300;
      font-style: italic;
      line-height: 1.7;
      text-align: center;
      color: var(--text-muted);
      max-width: 360px;
    }

    /* ── Link Groups ── */
    .group {
      width: 100%;
      margin-bottom: 32px;
    }

    .group-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--deep-red);
      margin-bottom: 10px;
      padding-left: 2px;
    }

    /* ── Buttons ── */
    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 13px 20px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.022);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-main);
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s, color 0.25s, transform 0.2s;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--dark-red);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.25s ease;
    }

    .link-btn:hover {
      background: rgba(139, 26, 26, 0.1);
      border-color: rgba(180, 140, 40, 0.35);
      color: var(--accent-red);
      transform: translateX(3px);
    }

    .link-btn:hover::before { transform: scaleY(1); }

    .link-btn.primary { border-color: rgba(139, 26, 26, 0.4); }

    .btn-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.7;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .link-btn:hover .btn-icon { opacity: 1; }

    .btn-label { flex: 1; }

    .btn-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      opacity: 0.4;
    }
  </style>
</head>
<body>

<!-- Language Toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
  <div class="lang-divider"></div>
  <button class="lang-btn" id="btn-sr" onclick="setLang('sr')">СР</button>
</div>

<div class="container">

  <!-- Avatar -->
  <div class="avatar-wrap">
    <canvas class="avatar-canvas" id="borderCanvas"></canvas>
    <div class="avatar-inner">
      <img src="./media/images/MilJapaneseAvatar-Transparent-1280x1280.png" alt="avatar">
    </div>
  </div>

  <!-- Name & Title -->
  <div class="name" data-i18n="name">Mil Stamenković</div>
  <div class="title-line" data-i18n="title">Contacts</div>

  <p class="bio"><span data-i18n="country">Serbia</span> / <span data-i18n="nationality">Serbian</span></p>

  <!-- Contact -->
  <div class="group">

    <a class="link-btn primary" href="https://milproduction.wordpress.com/@">
      <span class="btn-icon"><i class="fa-regular fa-envelope"></i></span>
      <span class="btn-label" data-i18n="btn-email">Email</span>
      <span class="btn-sub">@</span>
    </a>

    <a class="link-btn" href="https://milstamenkovic.github.io" target="_blank" rel="noopener">
      <span class="btn-icon"><i class="fa-solid fa-globe"></i></span>

      <span class="btn-sub">milstamenkovic.github.io</span>
    </a>
  </div>

  <!-- Work -->
  <div class="group">
    <div class="group-label" data-i18n="group-work">Work</div>

    <a class="link-btn" href="https://milproduction.wordpress.com" target="_blank" rel="noopener">
      <span class="btn-icon"><i class="fa-solid fa-briefcase"></i></span>
      <span class="btn-label" data-i18n="btn-portfolio">Portfolio</span>

    <a class="link-btn" href="https://imdb.com/name/yourpage" target="_blank" rel="noopener">
      <span class="btn-icon"><i class="fa-brands fa-imdb"></i></span>

  </div>

  <!-- Social -->
  <div class="group">
    <div class="group-label" data-i18n="group-social">Social</div>

    <a class="link-btn" href="https://twitter.com/milstamenkovic" target="_blank" rel="noopener">
      <span class="btn-icon"><i class="fa-brands fa-twitter"></i></span>
      <span class="btn-label">Twitter / X</span>

    <a class="link-btn" href="https://youtube.com/@milstamenkovic" target="_blank" rel="noopener">

    <a class="link-btn" href="https://instagram.com/milstamenkovic" target="_blank" rel="noopener">
      <span class="btn-icon"><i class="fa-brands fa-instagram"></i></span>
      <span class="btn-label">Instagram</span>
      <span class="btn-sub">@milstamenkovic</span>
    </a>
  </div>

</div>

<footer><a href="https://milstamenkovic.github.io">© 2026 Mil Stamenković</a></footer>

<script>
  // ─────────────────────────────────────────────────────────────
  // TRANSLATIONS
  // Fill in the 'sr' values with your Serbian translations.
  // The 'en' values are the originals — do not change those.
  // ─────────────────────────────────────────────────────────────
  const i18n = {
    en: {
      'title':         'Contacts',
      'country':       'Serbia',
      'name':          'Mil Stamenković',
      'nationality':   'Serbian',
      'group-contact': 'Contact',
      'group-work':    'Work',
      'group-social':  'Social',
      'btn-email':     'Email',
      'btn-website':   'Website',
      'btn-portfolio': 'Portfolio',
      'btn-imdb-sub':  'Filmography',
    },
    sr: {
      'title':         'Контакти',
      'name':          'Милан Стаменковић',
      'country':       'Србија',
      'nationality':   'Србијанац',
      'group-contact': 'Контакти',
      'group-work':    'Посао',
      'group-social':  'Друштвене мреже',
      'btn-email':     'Имејл',
      'btn-website':   'Вебсајт',
      'btn-portfolio': 'Радови',
      'btn-imdb-sub':  'Филмографија',
    }
  };

  function setLang(lang) {
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-sr').classList.toggle('active', lang === 'sr');
    document.documentElement.lang = lang === 'sr' ? 'sr' : 'en';

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (i18n[lang][key] !== undefined) el.textContent = i18n[lang][key];
    });
  }

  // ─────────────────────────────────────────────────────────────
  // CANVAS BORDER ANIMATION
  // ─────────────────────────────────────────────────────────────
  const canvas = document.getElementById('borderCanvas');
  const ctx    = canvas.getContext('2d');

  function initCanvas() {
    const dpr  = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return { W: rect.width, H: rect.height };
  }

  let { W, H } = initCanvas();

  const BORDER_W = 1.5;
  const TAIL_PX  = 60;
  const SPEED_PX = 110;

  function posAt(d, w, h) {
    const p = 2 * (w + h);
    d = ((d % p) + p) % p;
    if (d <= w)         return { x: d,         y: 0           };
    if (d <= w + h)     return { x: w,         y: d - w       };
    if (d <= 2*w + h)   return { x: w-(d-w-h), y: h           };
                        return { x: 0,         y: h-(d-2*w-h) };
  }

  let dist = 0;
  let last = null;

  function frame(ts) {
    if (last === null) last = ts;
    const dt = (ts - last) / 1000;
    last = ts;

    dist += SPEED_PX * dt;
    const perim = 2 * (W + H);
    if (dist >= perim) dist -= perim;

    const w = W, h = H;
    const off = BORDER_W / 2;

    ctx.clearRect(0, 0, w, h);

    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth   = BORDER_W;
    ctx.strokeRect(off, off, w - BORDER_W, h - BORDER_W);

    const STEPS = 72;
    for (let i = 0; i < STEPS; i++) {
      const t0 = i / STEPS;
      const t1 = (i + 1) / STEPS;
      const p0 = posAt(dist - TAIL_PX * (1 - t0), w, h);
      const p1 = posAt(dist - TAIL_PX * (1 - t1), w, h);
      const alpha = Math.pow(t0, 1.8);

      let r, g, b;
      if (t0 < 0.35) {
        r = 110; g = 55; b = 8;
      } else if (t0 < 0.70) {
        const f = (t0 - 0.35) / 0.35;
        r = 110 + f*60; g = 15; b = 8;
      } else {
        const f = (t0 - 0.70) / 0.30;
        r = 170 + f*85; g = 15 + f*25; b = 8 + f*12;
      }

      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = `rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${alpha.toFixed(3)})`;
      ctx.lineWidth   = 1.5 + t0 * 2;
      ctx.lineCap     = 'round';
      ctx.stroke();
    }

    const head = posAt(dist, w, h);
    const grd  = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 7);
    grd.addColorStop(0,    'rgba(255, 90, 50, 1)');
    grd.addColorStop(0.35, 'rgba(220, 30, 15, 0.7)');
    grd.addColorStop(1,    'rgba(160, 10,  5, 0)');
    ctx.beginPath();
    ctx.arc(head.x, head.y, 7, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);

  window.addEventListener('resize', () => {
    ({ W, H } = initCanvas());
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Finger Penalty Kick</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --grass: #2d5a1b;
    --grass-light: #3a7a24;
    --white: #f0f0f0;
    --yellow: #f5c518;
    --red: #e63946;
    --sky: #1a1a2e;
  }

  body {
    background: var(--sky);
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--white);
  }

  #game-container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  /* ── FIELD ── */
  #field {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 60%;
    background: linear-gradient(180deg, var(--grass-light) 0%, var(--grass) 100%);
  }

  .grass-stripe {
    position: absolute;
    top: 0; bottom: 0;
    width: 12.5%;
    background: rgba(0,0,0,0.07);
  }
  .grass-stripe:nth-child(odd) { background: rgba(255,255,255,0.04); }

  /* ── SKY / STADIUM ── */
  #sky {
    position: absolute;
    top: 0; width: 100%; height: 40%;
    background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 60%, #0d3a0d 100%);
  }

  .crowd-row {
    position: absolute;
    height: 12px;
    width: 100%;
    display: flex;
  }
  .crowd-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin: 1px;
    opacity: 0.5;
  }

  /* ── GOAL ── */
  #goal {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 58%;
    width: 44%;
    height: 22vh;
    border: 6px solid var(--white);
    border-bottom: none;
    box-shadow: 0 0 30px rgba(255,255,255,0.3), inset 0 0 60px rgba(0,0,0,0.6);
    z-index: 5;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    overflow: hidden;
    background: rgba(0,0,0,0.2);
  }

  .net-cell {
    border: 1px solid rgba(255,255,255,0.15);
  }

  /* ── PENALTY SPOT ── */
  #penalty-spot {
    position: absolute;
    bottom: 26%;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    background: var(--white);
    border-radius: 50%;
    z-index: 6;
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
  }

  /* ── BALL ── */
  #ball {
    position: absolute;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0%, #ccc 40%, #888 100%);
    box-shadow: 2px 4px 12px rgba(0,0,0,0.8), inset -4px -4px 8px rgba(0,0,0,0.3);
    z-index: 10;
    left: 50%;
    transform: translateX(-50%);
    bottom: 26.5%;
    transition: none;
  }

  /* pentagon patches */
  #ball::before {
    content: '⚽';
    position: absolute;
    font-size: 32px;
    top: -2px; left: -2px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  }

  /* ── GOALKEEPER ── */
  #keeper {
    position: absolute;
    bottom: 58%;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 90px;
    z-index: 6;
    transition: left 0.15s ease-out;
  }

  .keeper-body {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* SVG goalkeeper */
  #keeper-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
  }

  /* ── CAMERA + CANVAS ── */
  #camera-wrap {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 200px;
    height: 150px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.3);
    z-index: 20;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
  }

  #webcam {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    display: block;
  }

  #hand-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    transform: scaleX(-1);
  }

  /* ── HUD ── */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 28px;
    z-index: 30;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  .hud-block {
    text-align: center;
  }

  .hud-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
    font-weight: 600;
  }

  .hud-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(245,197,24,0.5);
  }

  #timer-bar {
    position: absolute;
    top: 0; left: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--yellow), var(--red));
    transition: width 1s linear;
    z-index: 31;
    box-shadow: 0 0 10px var(--yellow);
  }

  /* ── SHOOT INDICATOR ── */
  #shoot-ring {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 4px solid var(--yellow);
    transform: translate(-50%, -50%) scale(0);
    z-index: 25;
    pointer-events: none;
    transition: transform 0.1s ease;
    box-shadow: 0 0 20px var(--yellow);
  }

  #aim-dot {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--yellow);
    transform: translate(-50%, -50%);
    z-index: 26;
    pointer-events: none;
    box-shadow: 0 0 12px var(--yellow);
    display: none;
  }

  /* countdown arc */
  #shoot-timer {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 30;
    display: none;
  }

  #shoot-timer-circle {
    transform: rotate(-90deg);
    transform-origin: center;
  }

  /* ── OVERLAYS ── */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
  }

  .overlay h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 100px);
    color: var(--yellow);
    text-shadow: 0 0 40px rgba(245,197,24,0.6);
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .overlay p {
    font-size: 20px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  .btn {
    padding: 14px 44px;
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 4px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 0 30px rgba(245,197,24,0.4);
  }

  .btn:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(245,197,24,0.7); }
  .btn:active { transform: scale(0.97); }

  #result-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(60px, 14vw, 140px);
    letter-spacing: 6px;
    text-shadow: 0 0 60px currentColor;
    animation: pulse 0.5s ease-out;
  }

  @keyframes pulse {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .goal-text { color: #4ade80; }
  .miss-text { color: var(--red); }
  .save-text { color: #60a5fa; }

  #final-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(80px, 18vw, 180px);
    color: var(--yellow);
    line-height: 1;
    text-shadow: 0 0 60px rgba(245,197,24,0.6);
  }

  /* ── SHOT COUNTDOWN ── */
  #shot-countdown {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--yellow);
    letter-spacing: 2px;
    display: none;
    text-shadow: 0 0 10px var(--yellow);
  }

  /* ── GOAL FLASH ── */
  #goal-flash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 40;
    opacity: 0;
  }

  #goal-flash.flash-goal {
    animation: flashGreen 0.5s ease-out;
  }
  #goal-flash.flash-save {
    animation: flashBlue 0.5s ease-out;
  }

  @keyframes flashGreen {
    0% { background: rgba(74,222,128,0.6); opacity:1; }
    100% { background: rgba(74,222,128,0); opacity:0; }
  }
  @keyframes flashBlue {
    0% { background: rgba(96,165,250,0.6); opacity:1; }
    100% { background: rgba(96,165,250,0); opacity:0; }
  }

  /* ── PERMISSION ERROR ── */
  #cam-status {
    position: absolute;
    bottom: 10px;
    right: 10px;
    width: 200px;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 12px;
    font-size: 12px;
    text-align: center;
    z-index: 25;
    display: none;
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div id="game-container">

  <!-- Flash effect -->
  <div id="goal-flash"></div>

  <!-- Timer bar -->
  <div id="timer-bar" style="width:100%"></div>

  <!-- Sky / Stadium -->
  <div id="sky"></div>

  <!-- Field -->
  <div id="field">
    <div class="grass-stripe" style="left:0%"></div>
    <div class="grass-stripe" style="left:12.5%"></div>
    <div class="grass-stripe" style="left:25%"></div>
    <div class="grass-stripe" style="left:37.5%"></div>
    <div class="grass-stripe" style="left:50%"></div>
    <div class="grass-stripe" style="left:62.5%"></div>
    <div class="grass-stripe" style="left:75%"></div>
    <div class="grass-stripe" style="left:87.5%"></div>
  </div>

  <!-- Goal -->
  <div id="goal"></div>

  <!-- Goalkeeper -->
  <div id="keeper">
    <svg id="keeper-svg" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
      <!-- body/jersey -->
      <rect x="18" y="30" width="24" height="30" rx="3" fill="#f97316"/>
      <!-- number -->
      <text x="30" y="50" text-anchor="middle" font-size="10" font-weight="bold" fill="white">1</text>
      <!-- head -->
      <circle cx="30" cy="22" r="12" fill="#f5c5a3"/>
      <!-- hair -->
      <ellipse cx="30" cy="12" rx="12" ry="6" fill="#3b1f0a"/>
      <!-- eyes -->
      <circle cx="25" cy="22" r="2" fill="#1a1a1a"/>
      <circle cx="35" cy="22" r="2" fill="#1a1a1a"/>
      <!-- gloves left -->
      <rect x="6" y="30" width="12" height="8" rx="4" fill="#fbbf24"/>
      <!-- gloves right -->
      <rect x="42" y="30" width="12" height="8" rx="4" fill="#fbbf24"/>
      <!-- shorts -->
      <rect x="18" y="58" width="10" height="14" rx="2" fill="#1e40af"/>
      <rect x="32" y="58" width="10" height="14" rx="2" fill="#1e40af"/>
      <!-- socks/boots left -->
      <rect x="18" y="70" width="10" height="12" rx="2" fill="#fff"/>
      <rect x="17" y="80" width="12" height="6" rx="3" fill="#1a1a1a"/>
      <!-- socks/boots right -->
      <rect x="32" y="70" width="10" height="12" rx="2" fill="#fff"/>
      <rect x="31" y="80" width="12" height="6" rx="3" fill="#1a1a1a"/>
      <!-- arms up/spread -->
      <line x1="18" y1="35" x2="2" y2="25" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
      <line x1="42" y1="35" x2="58" y2="25" stroke="#f97316" stroke-width="8" stroke-linecap="round"/>
    </svg>
  </div>

  <!-- Penalty spot + ball -->
  <div id="penalty-spot"></div>
  <div id="ball"></div>

  <!-- Aim dot and ring -->
  <div id="aim-dot"></div>
  <div id="shoot-ring"></div>

  <!-- Shot countdown -->
  <div id="shot-countdown">SHOOTING IN <span id="shot-secs">3</span>s</div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Score</div>
      <div class="hud-value" id="score-display">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="time-display">60</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Shots</div>
      <div class="hud-value" id="shots-display">0</div>
    </div>
  </div>

  <!-- Camera -->
  <div id="camera-wrap">
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="hand-canvas"></canvas>
  </div>
  <div id="cam-status">📷 Camera not available – using mouse mode</div>

  <!-- START OVERLAY -->
  <div class="overlay" id="start-overlay">
    <h1>⚽ Penalty</h1>
    <p>Point your finger at the goal to aim · Jab forward to shoot</p>
    <button class="btn" id="start-btn">KICK OFF</button>
    <p style="margin-top:16px; font-size:13px; opacity:0.4">Allow camera access for finger tracking</p>
  </div>

  <!-- RESULT FLASH OVERLAY -->
  <div class="overlay" id="result-overlay" style="display:none; background:rgba(0,0,0,0.5)">
    <div id="result-text"></div>
  </div>

  <!-- GAME OVER OVERLAY -->
  <div class="overlay" id="gameover-overlay" style="display:none;">
    <h1>Full Time</h1>
    <p>Final Score</p>
    <div id="final-score">0</div>
    <p style="margin-top:8px; opacity:0.5" id="shots-summary"></p>
    <button class="btn" id="restart-btn" style="margin-top:24px">PLAY AGAIN</button>
  </div>

</div>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════
const STATE = {
  running: false,
  score: 0,
  shots: 0,
  timeLeft: 60,
  ballAnimating: false,
  shotQueued: false,
  shotCountdown: 0,
  shotTimer: null,
  gameTimer: null,
  fingerPos: null,          // {x,y} normalized 0-1 on screen
  aimX: -1, aimY: -1,
  keeperX: 0.5,
  keeperDir: 1,
  keeperSpeed: 0.004,
};

// DOM refs
const ball       = document.getElementById('ball');
const keeper     = document.getElementById('keeper');
const aimDot     = document.getElementById('aim-dot');
const shootRing  = document.getElementById('shoot-ring');
const scoreEl    = document.getElementById('score-display');
const timeEl     = document.getElementById('time-display');
const shotsEl    = document.getElementById('shots-display');
const timerBar   = document.getElementById('timer-bar');
const shotCountEl= document.getElementById('shot-countdown');
const shotSecsEl = document.getElementById('shot-secs');
const goalFlash  = document.getElementById('goal-flash');
const camStatus  = document.getElementById('cam-status');

// ── Goal bounds on screen (computed at runtime) ──
let goalBounds = {};
function updateGoalBounds() {
  const g = document.getElementById('goal').getBoundingClientRect();
  goalBounds = { left: g.left, right: g.right, top: g.top, bottom: g.bottom, w: g.width, h: g.height };
}

// ══════════════════════════════════════════════
//  CROWD GENERATION
// ══════════════════════════════════════════════
function buildCrowd() {
  const sky = document.getElementById('sky');
  const colors = ['#e63946','#f5c518','#2a9d8f','#e9c46a','#f4a261','#264653','#a8dadc'];
  for (let r = 0; r < 4; r++) {
    const row = document.createElement('div');
    row.className = 'crowd-row';
    row.style.bottom = (r * 14 + 8) + 'px';
    for (let i = 0; i < 120; i++) {
      const d = document.createElement('div');
      d.className = 'crowd-dot';
      d.style.background = colors[Math.floor(Math.random()*colors.length)];
      d.style.width = d.style.height = (6 + Math.random()*6)+'px';
      row.appendChild(d);
    }
    sky.appendChild(row);
  }
}

// ══════════════════════════════════════════════
//  GOAL MESH
// ══════════════════════════════════════════════
function buildGoalMesh() {
  const goal = document.getElementById('goal');
  for (let i = 0; i < 24; i++) {
    const c = document.createElement('div');
    c.className = 'net-cell';
    goal.appendChild(c);
  }
}

// ══════════════════════════════════════════════
//  KEEPER AI
// ══════════════════════════════════════════════
function keeperAI() {
  if (!STATE.running || STATE.ballAnimating) return;
  STATE.keeperX += STATE.keeperDir * STATE.keeperSpeed;
  if (STATE.keeperX > 0.78) STATE.keeperDir = -1;
  if (STATE.keeperX < 0.22) STATE.keeperDir = 1;
  // Slight random jitter
  if (Math.random() < 0.01) STATE.keeperDir *= -1;
  positionKeeper(STATE.keeperX);
}

function positionKeeper(nx) {
  const goalEl = document.getElementById('goal');
  const gr = goalEl.getBoundingClientRect();
  const kw = 60;
  const px = gr.left + gr.width * nx - kw/2;
  keeper.style.left = px + 'px';
  keeper.style.transform = 'none';
}

// ══════════════════════════════════════════════
//  FLICK / JAB DETECTION
//  We track the "hand span" (wrist → middle finger tip distance)
//  as a depth proxy. A sudden spike = jab toward screen = SHOOT.
// ══════════════════════════════════════════════
const FLICK = {
  history: [],        // rolling buffer of {span, time}
  WINDOW_MS: 200,     // look back this many ms
  SPIKE_RATIO: 1.18,  // span must grow by this factor to count as jab
  COOLDOWN_MS: 800,   // ignore further jabs for this long after one fires
  lastShot: 0,
};

function getHandSpan(lm) {
  // Euclidean distance wrist(0) → middle fingertip(12)
  const dx = lm[0].x - lm[12].x;
  const dy = lm[0].y - lm[12].y;
  return Math.sqrt(dx*dx + dy*dy);
}

function detectFlick(span) {
  const now = performance.now();
  FLICK.history.push({ span, time: now });
  // Prune old entries
  FLICK.history = FLICK.history.filter(e => now - e.time < FLICK.WINDOW_MS + 100);

  if (now - FLICK.lastShot < FLICK.COOLDOWN_MS) return false;

  // Compare current span to the minimum span in the recent window
  const windowEntries = FLICK.history.filter(e => now - e.time < FLICK.WINDOW_MS);
  if (windowEntries.length < 3) return false;
  const minSpan = Math.min(...windowEntries.map(e => e.span));
  const maxSpan = Math.max(...windowEntries.map(e => e.span));

  // Jab = hand grew quickly (came closer to camera)
  if (maxSpan / minSpan >= FLICK.SPIKE_RATIO && maxSpan === span) {
    FLICK.lastShot = now;
    return true;
  }
  return false;
}

// ══════════════════════════════════════════════
//  AIM & SHOOT
// ══════════════════════════════════════════════
function updateAim(nx, ny, flickDetected) {
  // nx, ny = normalized 0-1 on the screen
  const sx = nx * window.innerWidth;
  const sy = ny * window.innerHeight;

  aimDot.style.display = 'block';
  aimDot.style.left = sx + 'px';
  aimDot.style.top  = sy + 'px';

  updateGoalBounds();
  const overGoal = sx >= goalBounds.left && sx <= goalBounds.right &&
                   sy >= goalBounds.top  && sy <= goalBounds.bottom;

  // Always store latest aim position
  STATE.aimX = nx;
  STATE.aimY = ny;

  if (overGoal) {
    shootRing.style.left = sx + 'px';
    shootRing.style.top  = sy + 'px';
    shootRing.style.transform = 'translate(-50%,-50%) scale(1)';
    shootRing.style.borderColor = '#f5c518';
    shotCountEl.style.display = 'block';
    shotSecsEl.textContent = '👆 FLICK!';

    // Fire on flick gesture
    if (flickDetected && !STATE.ballAnimating) {
      shotCountEl.style.display = 'none';
      triggerShot(STATE.aimX, STATE.aimY);
    }
  } else {
    shootRing.style.transform = 'translate(-50%,-50%) scale(0)';
    shotCountEl.style.display = 'none';
  }
}

function triggerShot(nx, ny) {
  if (STATE.ballAnimating || !STATE.running) return;
  STATE.ballAnimating = true;
  STATE.shots++;
  shotsEl.textContent = STATE.shots;

  const targetX = nx * window.innerWidth;
  const targetY = ny * window.innerHeight;

  // Current ball position
  const br = ball.getBoundingClientRect();
  const bx = br.left + br.width/2;
  const by = br.top  + br.height/2;

  // Animate ball
  animateBall(bx, by, targetX, targetY, () => {
    // Determine if saved or goal
    const keeperR = keeper.getBoundingClientRect();
    const keeperMid = keeperR.left + keeperR.width/2;
    const saved = Math.abs(targetX - keeperMid) < keeperR.width * 0.8;

    updateGoalBounds();
    const inGoal = targetX >= goalBounds.left && targetX <= goalBounds.right &&
                   targetY >= goalBounds.top  && targetY <= goalBounds.bottom;

    if (inGoal && !saved) {
      // GOAL!
      STATE.score++;
      scoreEl.textContent = STATE.score;
      showResult('GOAL!', 'goal-text');
      flashScreen('flash-goal');
    } else if (inGoal && saved) {
      showResult('SAVED!', 'save-text');
      flashScreen('flash-save');
    } else {
      showResult('MISS!', 'miss-text');
    }

    // Reset ball after delay
    setTimeout(() => {
      resetBall();
      STATE.ballAnimating = false;
      aimDot.style.display = 'none';
      shootRing.style.transform = 'translate(-50%,-50%) scale(0)';
    }, 1200);
  });
}

function animateBall(x0, y0, x1, y1, cb) {
  const duration = 500;
  const start = performance.now();

  // Keeper dives toward ball
  const goalEl = document.getElementById('goal');
  const gr = goalEl.getBoundingClientRect();
  const relX = (x1 - gr.left) / gr.width;
  const targetKeeper = Math.max(0.1, Math.min(0.9, relX));
  
  function frame(now) {
    const t = Math.min(1, (now - start) / duration);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

    // Ball position with arc
    const cx = x0 + (x1 - x0) * ease;
    const cy = y0 + (y1 - y0) * ease - Math.sin(Math.PI * t) * 60;
    const scale = 1 - t * 0.5; // gets smaller = going away

    ball.style.position = 'fixed';
    ball.style.left = (cx - 18) + 'px';
    ball.style.top  = (cy - 18) + 'px';
    ball.style.bottom = 'auto';
    ball.style.transform = `scale(${scale})`;
    ball.style.transition = 'none';

    // Keeper dive
    const kp = STATE.keeperX + (targetKeeper - STATE.keeperX) * ease;
    positionKeeper(kp);
    STATE.keeperX = kp;

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      cb();
    }
  }
  requestAnimationFrame(frame);
}

function resetBall() {
  ball.style.position = 'absolute';
  ball.style.left = '50%';
  ball.style.top = 'auto';
  ball.style.bottom = '26.5%';
  ball.style.transform = 'translateX(-50%)';
}

function showResult(text, cls) {
  const r = document.getElementById('result-overlay');
  const rt = document.getElementById('result-text');
  rt.textContent = text;
  rt.className = '';
  rt.classList.add(cls);
  r.style.display = 'flex';
  setTimeout(() => { r.style.display = 'none'; }, 1000);
}

function flashScreen(cls) {
  goalFlash.className = '';
  goalFlash.classList.add(cls);
  setTimeout(() => goalFlash.className = '', 500);
}

// ══════════════════════════════════════════════
//  TIMERS
// ══════════════════════════════════════════════
function startGameTimer() {
  STATE.timeLeft = 60;
  timeEl.textContent = 60;
  timerBar.style.width = '100%';

  STATE.gameTimer = setInterval(() => {
    STATE.timeLeft--;
    timeEl.textContent = STATE.timeLeft;
    timerBar.style.width = (STATE.timeLeft / 60 * 100) + '%';
    if (STATE.timeLeft <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  STATE.running = false;
  clearInterval(STATE.gameTimer);
  shotCountEl.style.display = 'none';
  aimDot.style.display = 'none';
  shootRing.style.transform = 'translate(-50%,-50%) scale(0)';

  document.getElementById('final-score').textContent = STATE.score;
  document.getElementById('shots-summary').textContent =
    `${STATE.score} goals from ${STATE.shots} shots`;
  document.getElementById('gameover-overlay').style.display = 'flex';
}

// ══════════════════════════════════════════════
//  GAME LOOP (keeper AI)
// ══════════════════════════════════════════════
function gameLoop() {
  keeperAI();
  requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════════
//  CAMERA + MEDIAPIPE HANDS
// ══════════════════════════════════════════════
let usingMouse = false;

async function initCamera() {
  const video = document.getElementById('webcam');
  const canvas = document.getElementById('hand-canvas');
  const ctx = canvas.getContext('2d');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    video.srcObject = stream;

    // Resize canvas to match
    video.addEventListener('loadedmetadata', () => {
      canvas.width  = video.videoWidth  || 320;
      canvas.height = video.videoHeight || 240;
    });

    // Try MediaPipe
    if (typeof Hands !== 'undefined') {
      const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
      hands.setOptions({ maxNumHands: 1, modelComplexity: 0, minDetectionConfidence: 0.6, minTrackingConfidence: 0.5 });

      hands.onResults(results => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
          const lm = results.multiHandLandmarks[0];

          // Draw landmarks
          drawConnectors(ctx, lm, HAND_CONNECTIONS, { color: 'rgba(255,200,0,0.5)', lineWidth: 1.5 });
          drawLandmarks(ctx, lm, { color: '#f5c518', lineWidth: 1, radius: 3 });

          // Index finger tip = landmark 8
          // Use direction: tip - knuckle to project where it "points"
          const tip     = lm[8];  // index tip
          const mid     = lm[6];  // index PIP
          const base    = lm[5];  // index MCP (knuckle)

          // Direction vector (from base toward tip, extended)
          const dx = tip.x - base.x;
          const dy = tip.y - base.y;

          // Project finger ray onto screen
          const scale = 3.5;
          let projX = tip.x + dx * scale;
          let projY = tip.y + dy * scale;

          // MediaPipe gives x mirrored for user-facing cam; flip back
          projX = 1 - projX;

          // Clamp
          projX = Math.max(0, Math.min(1, projX));
          projY = Math.max(0, Math.min(1, projY));

          // Flick / jab detection via hand span (depth proxy)
          const span = getHandSpan(lm);
          const flickDetected = detectFlick(span);

          // Draw flick indicator on canvas
          if (flickDetected) {
            ctx.save();
            ctx.fillStyle = 'rgba(245,197,24,0.85)';
            ctx.font = 'bold 18px sans-serif';
            ctx.fillText('💥 KICK!', 8, 24);
            ctx.restore();
          }

          if (STATE.running && !STATE.ballAnimating) {
            updateAim(projX, projY, flickDetected);
          }
        }
      });

      if (typeof Camera !== 'undefined') {
        const cam = new Camera(video, {
          onFrame: async () => { await hands.send({ image: video }); },
          width: 320, height: 240
        });
        cam.start();
      }
    }
  } catch (e) {
    // Camera not available – fall back to mouse
    enableMouseMode();
  }
}

function enableMouseMode() {
  usingMouse = true;
  document.getElementById('camera-wrap').style.display = 'none';
  camStatus.style.display = 'block';

  window.addEventListener('mousemove', e => {
    if (!STATE.running || STATE.ballAnimating) return;
    const nx = e.clientX / window.innerWidth;
    const ny = e.clientY / window.innerHeight;
    updateAim(nx, ny, false);
  });

  // Mouse click = flick
  window.addEventListener('click', e => {
    if (!STATE.running || STATE.ballAnimating) return;
    const nx = e.clientX / window.innerWidth;
    const ny = e.clientY / window.innerHeight;
    updateAim(nx, ny, true);
  });
}

// ══════════════════════════════════════════════
//  START / RESTART
// ══════════════════════════════════════════════
function startGame() {
  STATE.running = true;
  STATE.score = 0;
  STATE.shots = 0;
  STATE.timeLeft = 60;
  STATE.ballAnimating = false;
  STATE.shotQueued = false;
  STATE.keeperX = 0.5;

  scoreEl.textContent = '0';
  shotsEl.textContent = '0';
  timeEl.textContent  = '60';

  resetBall();
  updateGoalBounds();
  positionKeeper(0.5);

  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('gameover-overlay').style.display = 'none';
  document.getElementById('result-overlay').style.display = 'none';

  startGameTimer();
}

document.getElementById('start-btn').addEventListener('click', () => {
  initCamera();
  startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  startGame();
});

buildCrowd();
buildGoalMesh();
requestAnimationFrame(gameLoop);
window.addEventListener('resize', updateGoalBounds);
updateGoalBounds();
